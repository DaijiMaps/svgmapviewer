name: Build

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.x'
      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 11
          run_install: true
      - run: pnpm -r build --sequential
      - run: pnpm test
